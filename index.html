<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIT校园生活圈 Web Demo</title>
  <style>
    :root {
      --hit-blue: #24508f;
      --hit-blue-2: #153662;
      --cyan: #1f9bb4;
      --green: #27805d;
      --orange: #d97726;
      --red: #c24145;
      --ink: #1d2939;
      --muted: #667085;
      --line: #dbe4ef;
      --soft: #f4f7fb;
      --soft-2: #eef4fb;
      --paper: #ffffff;
      --shadow: 0 14px 36px rgba(31, 65, 112, .10);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: #f6f9fd;
      overflow: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    img { display: block; max-width: 100%; }
    .hidden { display: none !important; }

    .topbar {
      height: 74px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 30px;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(37, 80, 143, .045);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 210px;
      color: var(--hit-blue);
      font-weight: 900;
      font-size: 20px;
    }

    .brand-mark, .avatar {
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--hit-blue), var(--hit-blue-2));
      font-weight: 900;
      flex: none;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      letter-spacing: .5px;
      font-size: 13px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 100%;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav button {
      height: 100%;
      padding: 0 14px;
      color: #344054;
      background: transparent;
      font-weight: 800;
      white-space: nowrap;
      position: relative;
    }
    .nav button.active { color: var(--hit-blue); }
    .nav button.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 4px;
      background: var(--hit-blue);
      border-radius: 999px 999px 0 0;
    }

    .search {
      width: min(320px, 25vw);
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
    }
    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
    }

    .account-switch {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
    }
    .account-switch button {
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      white-space: nowrap;
    }
    .account-switch button.active {
      background: var(--hit-blue);
      color: #fff;
    }

    .app-shell {
      height: calc(100vh - 74px);
      display: grid;
      grid-template-columns: 320px minmax(520px, 760px) minmax(330px, 430px) minmax(240px, 280px);
      gap: 22px;
      padding: 26px 30px 22px;
      max-width: 1900px;
      margin: 0 auto;
      overflow: hidden;
    }

    .rail, .feed, .widgets, .aside {
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: #b9c8dc transparent;
      padding-right: 4px;
    }
    .rail::-webkit-scrollbar, .feed::-webkit-scrollbar, .widgets::-webkit-scrollbar, .aside::-webkit-scrollbar { width: 8px; }
    .rail::-webkit-scrollbar-thumb, .feed::-webkit-scrollbar-thumb, .widgets::-webkit-scrollbar-thumb, .aside::-webkit-scrollbar-thumb {
      background: #b9c8dc;
      border-radius: 999px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 30px;
    }

    .rail, .widgets, .aside {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 26px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(37, 80, 143, .035);
      overflow: hidden;
      flex: none;
    }

    .pad { padding: 16px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .section-title {
      color: #233853;
      font-size: 16px;
      font-weight: 900;
    }
    .muted { color: var(--muted); }
    .small { color: var(--muted); font-size: 12px; line-height: 1.6; }

    .profile-hero {
      padding: 16px;
      background: #fff;
      color: var(--ink);
    }
    .profile-row { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.28);
    }
    .avatar.large { width: 58px; height: 58px; font-size: 22px; }
    .profile-name { font-weight: 900; }
    .profile-sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .stat {
      background: #fff;
      border: 0;
      border-radius: 8px;
      padding: 9px 6px;
      text-align: center;
    }
    .stat b { display: block; font-size: 18px; }
    .stat span { font-size: 12px; color: var(--muted); }

    .side-menu { display: flex; flex-direction: column; gap: 4px; }
    .side-menu button {
      min-height: 42px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border-radius: 8px;
      color: #405168;
      font-weight: 800;
      text-align: left;
    }
    .side-menu button:hover, .side-menu button.active {
      background: var(--soft-2);
      color: var(--hit-blue);
    }

    .hero {
      min-height: 252px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      align-items: center;
      gap: 20px;
      padding: 34px 38px;
      background:
        linear-gradient(90deg, rgba(236,243,255,.95), rgba(240,246,255,.86)),
        url("data:image/svg+xml,%3Csvg width='900' height='260' viewBox='0 0 900 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2324508f' stroke-width='2' opacity='.28'%3E%3Cpath d='M520 230h300M565 230V120h210v110M610 230v-76h48v76M692 230v-76h48v76M565 120h210M590 120l32-50h92l34 50M650 230V76h32v154M650 76l16-48 16 48M490 230c28-42 70-42 100 0M770 230c25-45 70-45 95 0M80 228h260M130 228V142h160v86M170 228v-52h40v52M230 228v-52h40v52M130 142h160M150 142l25-40h70l25 40'/%3E%3Cpath d='M70 90c22-16 45-16 68 0M430 76c20-13 42-13 63 0M358 94c12-9 26-9 40 0'/%3E%3C/g%3E%3C/svg%3E") right bottom/70% no-repeat;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
      color: var(--hit-blue);
      line-height: 1.2;
    }
    .hero p {
      margin: 0 0 18px;
      color: #48627f;
      line-height: 1.75;
    }
    .hero-img {
      height: 150px;
      border-radius: 8px;
      background: url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=680&q=72") center/cover;
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: var(--shadow);
    }

    .primary-btn, .secondary-btn, .text-btn, .danger-btn {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 8px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .primary-btn { background: var(--hit-blue); color: #fff; }
    .primary-btn:hover { background: var(--hit-blue-2); }
    .secondary-btn {
      background: #fff;
      color: var(--hit-blue);
      border: 1px solid var(--line);
    }
    .text-btn { background: transparent; color: var(--hit-blue); padding-inline: 8px; }
    .danger-btn { background: #fff1f1; color: var(--red); }

    .composer {
      display: grid;
      gap: 12px;
    }
    .composer-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 140px;
      gap: 10px;
    }
    .field, .composer textarea, .comment-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      outline: 0;
    }
    .field { height: 42px; padding: 0 12px; }
    .composer textarea {
      min-height: 92px;
      resize: vertical;
      padding: 12px;
      line-height: 1.7;
    }
    .composer-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tool-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .tool {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #405168;
      font-weight: 800;
    }
    .tool.active {
      color: var(--hit-blue);
      background: var(--soft-2);
      border-color: #b7c9df;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-tabs button {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      color: #415066;
      font-weight: 850;
    }
    .filter-tabs button.active {
      background: var(--hit-blue);
      color: #fff;
      border-color: var(--hit-blue);
    }

    .post {
      padding: 16px;
      border-top: 1px solid var(--line);
    }
    .post:first-child { border-top: 0; }
    .post-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .post-head .spacer { flex: 1; }
    .author { font-weight: 900; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft-2);
      color: var(--hit-blue);
      font-size: 12px;
      font-weight: 900;
    }
    .badge.org { background: #e8f7fb; color: #08748a; }
    .post-title { margin: 6px 0; color: #203650; font-size: 17px; font-weight: 900; }
    .post-text { margin: 0 0 10px; color: #44556b; line-height: 1.75; white-space: pre-wrap; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .tag {
      padding: 5px 8px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--hit-blue);
      font-size: 12px;
      font-weight: 850;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .post-image {
      min-height: 126px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      border: 1px solid var(--line);
    }
    .post-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid #edf1f6;
    }
    .post-actions button {
      min-height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }
    .post-actions button:hover, .post-actions button.active {
      background: var(--soft-2);
      color: var(--hit-blue);
    }

    .comment-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 12px;
    }
    .comment-input {
      height: 38px;
      padding: 0 12px;
    }
    .comments {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .comment {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      color: #46566b;
      line-height: 1.55;
      font-size: 13px;
    }
    .comment b { color: #233853; }

    .rec-list { display: grid; gap: 10px; }
    .person, .notice, .activity, .mini-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
    }
    .person {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }
    .person .avatar { width: 38px; height: 38px; }
    .person-name { font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .notice, .activity { display: flex; gap: 10px; }
    .notice-ico {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex: none;
      background: var(--soft-2);
      color: var(--hit-blue);
      font-weight: 900;
    }
    .activity img {
      width: 86px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
      flex: none;
    }
    .activity b { display: block; margin-bottom: 4px; }
    .progress {
      height: 7px;
      background: var(--soft-2);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--hit-blue));
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .dash {
      padding: 12px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .dash b { display: block; color: var(--hit-blue); font-size: 22px; margin-bottom: 2px; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 80;
      background: #17233a;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 16px 38px rgba(0,0,0,.24);
      opacity: 0;
      transform: translateY(10px);
      transition: .22s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 26px;
      background:
        radial-gradient(circle at 16% 18%, rgba(36,80,143,.10), transparent 28%),
        radial-gradient(circle at 84% 86%, rgba(31,155,180,.08), transparent 30%),
        #fbfdff;
    }
    .login-shell {
      width: min(1460px, 100%);
      min-height: 760px;
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 20px 54px rgba(37,80,143,.14);
      overflow: hidden;
    }
    .login-left {
      position: relative;
      padding: 58px 64px;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(246,249,253,.82)),
        url("data:image/svg+xml,%3Csvg width='900' height='360' viewBox='0 0 900 360' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2324508f' stroke-width='2' opacity='.32'%3E%3Cpath d='M60 320h780M230 320V155h430v165M288 320v-105h75v105M528 320v-105h75v105M230 155h430M260 155l48-70h274l50 70M425 320V115h54v205M425 115l27-76 27 76M105 320c28-54 76-54 105 0M688 320c34-58 92-58 126 0M125 96c26-18 52-18 78 0M700 92c22-16 48-16 70 0M78 180c58 0 95 24 126 42M716 178c-54 4-94 26-130 50'/%3E%3Cpath d='M265 190h330M265 230h330M265 270h330M336 155v165M398 155v165M502 155v165M570 155v165'/%3E%3C/g%3E%3C/svg%3E") center bottom/100% 48% no-repeat;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--hit-blue);
      font-size: 30px;
      font-weight: 900;
    }
    .login-brand .brand-mark {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #fff;
      color: var(--hit-blue);
      border: 2px solid var(--hit-blue);
    }
    .login-slogan {
      margin-top: 210px;
      color: var(--hit-blue);
      font-size: 42px;
      line-height: 1.2;
      font-weight: 900;
    }
    .login-copy {
      margin-top: 18px;
      color: #355983;
      font-size: 18px;
      letter-spacing: .5px;
    }
    .login-right {
      display: grid;
      place-items: center;
      padding: 70px 72px;
    }
    .login-card {
      width: min(480px, 100%);
    }
    .login-card h1 {
      margin: 0 0 10px;
      color: var(--hit-blue);
      font-size: 32px;
    }
    .login-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
      margin: 34px 0 28px;
    }
    .login-tabs button {
      height: 44px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      border-radius: 0;
      position: relative;
    }
    .login-tabs button.active { color: var(--hit-blue); }
    .login-tabs button.active::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -1px;
      height: 3px;
      background: var(--hit-blue);
    }
    .login-field {
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      margin-bottom: 16px;
      color: #7b8ba0;
      background: #fff;
    }
    .login-field input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
    }
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 26px;
      color: var(--muted);
      font-size: 14px;
    }
    .login-options label { display: flex; align-items: center; gap: 8px; }
    .login-submit {
      width: 100%;
      height: 56px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--hit-blue), var(--hit-blue-2));
      color: #fff;
      font-weight: 900;
      font-size: 16px;
    }
    .login-other {
      margin-top: 28px;
      display: grid;
      gap: 18px;
      text-align: center;
      color: var(--muted);
    }
    .login-icons {
      display: flex;
      justify-content: center;
      gap: 70px;
    }
    .login-icons button {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--hit-blue);
      font-weight: 900;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .feature-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      min-height: 94px;
    }
    .feature-card b { display: block; margin-bottom: 6px; color: #233853; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--hit-blue);
      background: var(--soft-2);
      font-size: 12px;
      font-weight: 850;
    }
    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .market-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .market-card img { width: 100%; height: 128px; object-fit: cover; }
    .market-card .pad { padding: 12px; }
    .price { color: #d6452f; font-weight: 900; font-size: 17px; }

    @media (max-width: 1180px) {
      .app-shell { grid-template-columns: 230px minmax(0, 1fr); }
      .widgets, .aside { display: none; }
      .hero { grid-template-columns: 1fr; }
      .hero-img { display: none; }
      .search { display: none; }
    }

    @media (max-width: 820px) {
      body { overflow: auto; }
      .topbar { position: sticky; overflow-x: auto; padding: 0 12px; }
      .brand { min-width: 172px; }
      .account-switch { margin-left: auto; }
      .app-shell {
        height: auto;
        min-height: calc(100vh - 74px);
        overflow: visible;
        grid-template-columns: 1fr;
        padding: 12px;
      }

    const storeKey = "hit-campus-life-demo-v4";
    let state = loadState();

    function loadState() {
      try {
        const cached = JSON.parse(localStorage.getItem(storeKey));
        return cached ? { ...seed, ...cached } : structuredClone(seed);
      } catch (e) {
        return JSON.parse(JSON.stringify(seed));
      }
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function currentUser() {
      return state.account === "org"
        ? state.users.find(u => u.id === "orgMe")
        : state.users.find(u => u.id === "me");
    }

    function userById(id) {
      return state.users.find(u => u.id === id) || currentUser();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setPage(page) {
      state.page = page;
      state.filter = page === "home" ? state.filter : "all";
      save();
      render();

      state.account = account;

      state.filter = account === "org" ? "club" : "all";

      render();

      render();

      renderLeft();
      renderFeed();
      renderWidgets();
      renderRight();
      document.getElementById("studentBtn").classList.toggle("active", state.account === "student");
      document.getElementById("orgBtn").classList.toggle("active", state.account === "org");
      document.getElementById("searchInput").value = state.search || "";
    }

      const base = state.account === "org"
        ? [["home", "工作台"], ["club", "社团发布"], ["members", "成员申请"], ["activity", "活动管理"], ["notice", "通知中心"]]
        : [["home", "首页"], ["friend", "交友"], ["schedule", "记录"], ["notice", "通知"], ["help", "求助"], ["discussion", "讨论"]];

        `<button class="${state.page === id ? "active" : ""}" data-page="${id}">${navIcon(id)} ${label}</button>`
      ).join("");
    }

      return { home: "⌂", friend: "♧", schedule: "□", notice: "♢", help: "?", discussion: "○", club: "社", members: "审", activity: "动" }[id] || "•";

            <div>

    function postList() {
      const query = (state.search || "").trim().toLowerCase();
      let posts = state.posts;
      if (state.filter === "student") posts = posts.filter(p => p.type === "student");
      if (state.filter === "club") posts = posts.filter(p => p.type === "org");
      if (state.filter === "friend") posts = posts.filter(p => state.friends.includes(p.authorId) || p.authorId === "me");
      if (state.filter === "help") posts = posts.filter(p => p.channel === "help" || p.tags.join("").includes("搭子"));
      if (query) {
        posts = posts.filter(p => {
          const author = userById(p.authorId).name;
          return `${author} ${p.title} ${p.text} ${p.tags.join(" ")}`.toLowerCase().includes(query);
        });
      }
      if (!posts.length) return `<div class="pad muted">没有找到匹配内容，可以换个筛选条件或发布一条新帖子。</div>`;
      return posts.map(postCard).join("");

      const canConnect = !["me", "orgMe"].includes(author.id);

    function publishPost() {
      const title = document.getElementById("postTitle").value.trim();
      const text = document.getElementById("postText").value.trim();
      const channel = document.getElementById("postChannel").value;
      const tags = document.getElementById("postTags").value
        .split(/[,，#]/)
        .map(t => t.trim())
        .filter(Boolean);
      if (!title || !text) return toast("请先填写标题和内容");

      const me = currentUser();
      const imgStart = Math.floor(Math.random() * (imagePool.length - 2));
      state.posts.unshift({
        id: `p${Date.now()}`,
        authorId: me.id,
        type: state.account === "org" ? "org" : "student",
        channel,
        title,
        text,
        tags: tags.length ? tags : [state.account === "org" ? "社团发布" : "校园动态"],
        images: state.selectedImage ? imagePool.slice(imgStart, imgStart + (state.account === "org" ? 1 : 2)) : [],
        time: "刚刚",
        baseLikes: 0,
        comments: []
      });
      me.posts += 1;
      state.notices.unshift({ id: `n${Date.now()}`, type: "发布", text: `你发布了新内容：${title}`, time: "刚刚" });
      save();
      render();
      toast("帖子已发布到信息流");
    }

    function connect(id) {
      const u = userById(id);
      if (u.type === "org") {
        state.follows = state.follows.includes(id) ? state.follows.filter(x => x !== id) : [...state.follows, id];
        state.notices.unshift({ id: `n${Date.now()}`, type: "关注", text: `${state.follows.includes(id) ? "已关注" : "已取消关注"} ${u.name}`, time: "刚刚" });
      } else {
        if (!state.friends.includes(id)) {
          state.friends.push(id);
          state.notices.unshift({ id: `n${Date.now()}`, type: "好友", text: `你已添加 ${u.name} 为好友`, time: "刚刚" });
        }
      }
      save();
      render();
      toast(u.type === "org" ? "社团关注状态已更新" : "好友已添加，可在好友圈查看");
    }

    function addComment(id) {
      const input = document.querySelector(`[data-comment-input="${id}"]`);
      const text = input.value.trim();
      if (!text) return toast("请输入评论内容");
      const post = state.posts.find(p => p.id === id);
      post.comments.push([currentUser().name, text]);
      state.notices.unshift({ id: `n${Date.now()}`, type: "评论", text: `你评论了：${post.title}`, time: "刚刚" });
      save();
      render();
      setTimeout(() => document.querySelector(`[data-post="${id}"]`)?.scrollIntoView({ block: "center" }), 0);
      toast("评论已发布");
    }

    function joinActivity(id) {
      const activity = state.activities.find(a => a.id === id);
      if (!activity) return;
      if (activity.joined < activity.cap) activity.joined += 1;
      state.notices.unshift({ id: `n${Date.now()}`, type: "活动", text: `你已报名：${activity.title}`, time: "刚刚" });
      save();
      render();
      toast("报名成功，活动已加入通知中心");
    }

    function createActivity() {
      const me = currentUser();
      state.activities.unshift({
        id: `a${Date.now()}`,
        title: "摄影社校园夜景速拍活动",
        org: me.name,
        date: "周五 20:00",
        place: "主楼广场",
        joined: 0,
        cap: 60,
        img: imagePool[7]
      });
      state.notices.unshift({ id: `n${Date.now()}`, type: "活动", text: `${me.name} 新建了活动：摄影社校园夜景速拍活动`, time: "刚刚" });
      save();
      render();
      toast("社团活动已创建");
    }

    function manageActivity(id) {
      const activity = state.activities.find(a => a.id === id);
      state.notices.unshift({ id: `n${Date.now()}`, type: "管理", text: `已向报名用户发送提醒：${activity.title}`, time: "刚刚" });
      save();
      render();
      toast("已发送活动集合提醒");
    }

    function updateApplicant(id, status) {
      const applicant = state.applicants.find(a => a.id === id);
      if (applicant) applicant.status = status;
      state.notices.unshift({ id: `n${Date.now()}`, type: "审核", text: `${applicant.name} 的申请状态：${status}`, time: "刚刚" });
      save();
      render();
      toast(`申请已${status}`);
    }

    function sendNotice() {
      state.notices.unshift({ id: `n${Date.now()}`, type: "社团通知", text: `${currentUser().name}：本周活动集合时间请以最新通知为准。`, time: "刚刚" });
      save();
      render();
      toast("社团通知已发布");
    }

    function resetDemo() {
      localStorage.removeItem(storeKey);
      state = JSON.parse(JSON.stringify(seed));
      render();
      toast("演示数据已重置");
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    document.addEventListener("click", event => {
      const pageBtn = event.target.closest("[data-page]");
      if (pageBtn) {
        if (pageBtn.dataset.page === "reset") return resetDemo();
        return setPage(pageBtn.dataset.page);
      }

      const accountBtn = event.target.closest("[data-account]");
      if (accountBtn) return switchAccount(accountBtn.dataset.account);

      const filterBtn = event.target.closest("[data-filter]");
      if (filterBtn) {
        state.filter = filterBtn.dataset.filter;
        save();
        return renderFeed();
      }

      if (event.target.closest("[data-scroll-composer]")) {
        document.getElementById("composer")?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      const topicBtn = event.target.closest("[data-fill-topic]");
      if (topicBtn) {
        const input = document.getElementById("postTags");
        const topic = topicBtn.dataset.fillTopic;
        input.value = input.value ? `${input.value},${topic}` : topic;
        input.focus();
      }

      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) return;
      const id = actionEl.dataset.id;
      const actionMap = {
        login,
        publish: publishPost,
        toggleImage: () => { state.selectedImage = !state.selectedImage; save(); renderFeed(); },
        connect: () => connect(id),
        like: () => { state.likes[id] = !state.likes[id]; save(); renderFeed(); },
        focusComment: () => document.querySelector(`[data-comment-input="${id}"]`)?.focus(),
        comment: () => addComment(id),
        collect: () => toast("已收藏到个人账号内容区"),
        share: () => toast("分享链接已复制"),
        joinActivity: () => joinActivity(id),
        createActivity,
        manageActivity: () => manageActivity(id),
        prefillDiscussion: () => {
          setPage("home");
          setTimeout(() => {
            document.getElementById("postTitle").value = "关于期末复习节奏，大家怎么安排？";
            document.getElementById("postText").value = "想听听不同学院同学的复习安排，也欢迎分享资料和自习地点。";
            document.getElementById("postTags").value = "讨论,期末复习,学习方法";
            document.getElementById("postChannel").value = "study";
            document.getElementById("composer")?.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 0);
        },
        replyDiscussion: () => toast(`已进入讨论回复：${actionEl.dataset.title || ""}`),
        prefillHelp: () => {
          setPage("home");
          setTimeout(() => {
            document.getElementById("postTitle").value = "求助：高数证明题不会做";
            document.getElementById("postText").value = "这道题的第三问卡住了，求大佬指点一下思路，感谢！";
            document.getElementById("postTags").value = "求助,高数,学习互助";
            document.getElementById("postChannel").value = "help";
            document.getElementById("composer")?.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 0);
        },
        sellItem: () => toast("闲置发布入口已打开：演示版已在二手市场展示发布位"),
        askMarket: () => toast("已向卖家发送咨询消息"),
        takeErrand: () => toast("接单成功，请在通知中心查看联系方式"),
        joinGroup: () => toast("已提交加入小组申请"),
        approve: () => updateApplicant(id, "通过"),
        reject: () => updateApplicant(id, "拒绝"),
        sendNotice,
        readAll: () => toast("所有通知已标记为已读"),
        toast: () => toast("可以在活动列表中选择报名"),
      };
      actionMap[actionEl.dataset.action]?.();
    });

    document.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      const input = event.target.closest("[data-comment-input]");
      if (input) addComment(input.dataset.commentInput);
    });

    document.getElementById("searchInput").addEventListener("input", event => {
      state.search = event.target.value;
      save();
      renderFeed();
    });

    render();
  </script>
</body>
</html>
